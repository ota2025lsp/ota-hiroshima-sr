# ================================================================
# Decap CMS 設定ファイル
# ================================================================
# 【設定が必要な箇所】
#   1. repo: あなたのGitHubユーザー名/リポジトリ名 に変更してください
#   2. branch: 通常は main または master
# ================================================================

backend:
  name: github
  repo: ota2025lsp/ota-hiroshima-sr  # ← ここを変更！例: takuma-ota/ota-hiroshima-sr
  branch: main                                  # ← ブランチ名（通常は main）
  base_url: https://sveltia-cms-auth.pages.dev  # 無料の認証サービス（変更不要）

# メディアファイル（画像）の保存先
media_folder: "images/uploads"
public_folder: "/images/uploads"

# ロケール設定
locale: "ja"

# ================================================================
# コレクション（コンテンツの種類）の定義
# ================================================================
collections:
  - name: "posts"
    label: "ブログ記事"
    label_singular: "記事"
    folder: "_posts"              # 記事のMarkdownファイルを保存するフォルダ
    create: true                  # 新規作成を許可
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    editor:
      preview: false
    fields:
      - label: "タイトル"
        name: "title"
        widget: "string"
        hint: "記事のタイトルを入力してください"

      - label: "公開日"
        name: "date"
        widget: "datetime"
        format: "YYYY-MM-DD"
        date_format: "YYYY年MM月DD日"
        time_format: false
        default: ""

      - label: "カテゴリー"
        name: "category"
        widget: "select"
        options:
          - { label: "申請手続き", value: "shinsei" }
          - { label: "制度解説",   value: "seido" }
          - { label: "相談事例",   value: "jirei" }
          - { label: "お知らせ",   value: "news" }

      - label: "概要（SEO用）"
        name: "description"
        widget: "text"
        hint: "Google検索に表示される説明文（120〜160文字推奨）"

      - label: "アイキャッチ絵文字"
        name: "emoji"
        widget: "string"
        default: "📝"
        hint: "記事カードに表示する絵文字（例: 📋 📖 💬 📌）"

      - label: "本文"
        name: "body"
        widget: "markdown"
        hint: "Markdownで記事を書けます。見出しは ## や ### を使ってください。"
